<h2 mat-dialog-title>
  <mat-icon>person_search</mat-icon>
  BUSCAR CLIENTE
</h2>

<mat-dialog-content>
  <div style="display: flex; gap: 8px; margin-bottom: 12px">
    <mat-form-field appearance="outline" style="flex: 1">
      <mat-label>BUSCAR POR NOMBRE, RUC O TELÉFONO</mat-label>
      <input matInput [(ngModel)]="searchTerm" placeholder="Escriba para buscar..." />
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="filtrar()" style="height: 56px">
      <mat-icon>search</mat-icon>
    </button>
  </div>

  <table mat-table [dataSource]="filteredClientes" class="mat-elevation-z2" style="width: 100%">
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>NOMBRE</th>
      <td mat-cell *matCellDef="let c">{{ c.persona?.nombre }} {{ c.razon_social || '' }}</td>
    </ng-container>

    <ng-container matColumnDef="ruc">
      <th mat-header-cell *matHeaderCellDef>RUC</th>
      <td mat-cell *matCellDef="let c">{{ c.ruc || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="telefono">
      <th mat-header-cell *matHeaderCellDef>TELÉFONO</th>
      <td mat-cell *matCellDef="let c">{{ c.persona?.telefono || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let c">
        <button mat-icon-button color="primary" (click)="seleccionar(c)" matTooltip="Seleccionar">
          <mat-icon>check_circle</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="seleccionar(row)" style="cursor: pointer"></tr>
  </table>

  <div *ngIf="filteredClientes.length === 0" style="text-align: center; padding: 20px; opacity: 0.7">
    No se encontraron clientes.
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">CANCELAR</button>
</mat-dialog-actions>
