<h2 mat-dialog-title>
  <mat-icon>swap_horiz</mat-icon>
  TRANSFERIR MESA {{ data.mesaActual.numero }}
</h2>

<mat-dialog-content>
  <p>Seleccione la mesa de destino:</p>

  <div *ngIf="loading" style="text-align: center; padding: 20px">
    Cargando mesas...
  </div>

  <div *ngIf="!loading && mesasDisponibles.length === 0" style="text-align: center; padding: 20px">
    No hay mesas disponibles para transferir.
  </div>

  <div class="mesas-grid" *ngIf="!loading && mesasDisponibles.length > 0">
    <button
      mat-raised-button
      *ngFor="let mesa of mesasDisponibles"
      [color]="selectedMesa?.id === mesa.id ? 'accent' : 'primary'"
      class="mesa-button"
      (click)="selectMesa(mesa)"
      [matTooltip]="'Mesa ' + mesa.numero"
    >
      {{ mesa.numero }}
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">CANCELAR</button>
  <button
    mat-raised-button
    color="primary"
    [disabled]="!selectedMesa"
    (click)="confirmar()"
  >
    <mat-icon>swap_horiz</mat-icon>
    TRANSFERIR A MESA {{ selectedMesa?.numero }}
  </button>
</mat-dialog-actions>
