<h2 mat-dialog-title>
  <mat-icon>discount</mat-icon>
  DESCUENTO GLOBAL
</h2>

<mat-dialog-content>
  <div class="subtotal-display">
    <span>Subtotal actual:</span>
    <span class="subtotal-value">{{ data.subtotal | number:'1.0-2' }}</span>
  </div>

  <mat-divider></mat-divider>

  <div class="tipo-section">
    <mat-radio-group [(ngModel)]="tipoDescuento" (change)="onTipoChange()">
      <mat-radio-button value="porcentaje">PORCENTAJE (%)</mat-radio-button>
      <mat-radio-button value="monto">MONTO FIJO</mat-radio-button>
    </mat-radio-group>
  </div>

  <form [formGroup]="form">
    <mat-form-field appearance="outline" *ngIf="tipoDescuento === 'porcentaje'" style="width: 100%">
      <mat-label>PORCENTAJE DE DESCUENTO</mat-label>
      <input matInput type="number" formControlName="porcentaje" min="0" max="100" />
      <span matSuffix>%</span>
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="tipoDescuento === 'monto'" style="width: 100%">
      <mat-label>MONTO DE DESCUENTO</mat-label>
      <input matInput type="number" formControlName="monto" min="0" />
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%">
      <mat-label>MOTIVO (obligatorio)</mat-label>
      <input matInput formControlName="motivo" placeholder="Ej: CORTESÍA, EMPLEADO, PROMOCIÓN..." />
    </mat-form-field>
  </form>

  <mat-divider></mat-divider>

  <div class="resumen-section">
    <div class="resumen-row">
      <span>Descuento:</span>
      <span class="descuento-value">-{{ montoDescuento | number:'1.0-2' }}</span>
    </div>
    <div class="resumen-row total-row">
      <span>TOTAL CON DESCUENTO:</span>
      <span>{{ totalConDescuento | number:'1.0-2' }}</span>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button color="warn" (click)="quitarDescuento()" *ngIf="data.descuentoPorcentaje || data.descuentoMonto">
    QUITAR DESCUENTO
  </button>
  <button mat-button (click)="cancelar()">CANCELAR</button>
  <button
    mat-raised-button
    color="primary"
    [disabled]="!form.get('motivo')?.valid || montoDescuento <= 0"
    (click)="aplicar()"
  >
    <mat-icon>check</mat-icon>
    APLICAR
  </button>
</mat-dialog-actions>
