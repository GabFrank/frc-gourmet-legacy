<div class="dialog-container">
  <h2 mat-dialog-title>{{ data.title }}</h2>

  <mat-dialog-content>
    <!-- Tabs Mesas / Comandas -->
    <div class="tab-selector" *ngIf="hasComandas">
      <button
        mat-flat-button
        class="tab-btn"
        [class.active]="activeTab === 'MESAS'"
        (click)="activeTab = 'MESAS'">
        <mat-icon>table_restaurant</mat-icon> MESAS
      </button>
      <button
        mat-flat-button
        class="tab-btn"
        [class.active]="activeTab === 'COMANDAS'"
        (click)="activeTab = 'COMANDAS'">
        <mat-icon>receipt</mat-icon> COMANDAS
      </button>
    </div>

    <!-- Mesas grid -->
    <div class="tables-grid" *ngIf="activeTab === 'MESAS'">
      <button
        mat-raised-button
        *ngFor="let mesa of data.mesas"
        (click)="selectMesa(mesa)"
        [class.status-available]="mesa.estado === 'DISPONIBLE'"
        [class.status-occupied]="mesa.estado !== 'DISPONIBLE'"
        [class.status-reserved]="mesa.reservado"
        class="table-button">
        {{ mesa.numero }}
        <mat-icon *ngIf="mesa.reservado" class="reserved-icon">event_busy</mat-icon>
      </button>
    </div>

    <!-- Comandas grid -->
    <div class="tables-grid" *ngIf="activeTab === 'COMANDAS' && hasComandas">
      <button
        mat-raised-button
        *ngFor="let comanda of data.comandas"
        (click)="selectComanda(comanda)"
        [class.status-available]="comanda.estado === 'DISPONIBLE'"
        [class.status-occupied]="comanda.estado !== 'DISPONIBLE'"
        class="table-button">
        {{ comanda.numero }}
      </button>
    </div>

    <div *ngIf="activeTab === 'MESAS' && data.mesas.length === 0" class="no-mesas">
      No hay mesas disponibles
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">CANCELAR</button>
  </mat-dialog-actions>
</div>
