<div class="receta-dialog">
  <div class="dialog-header">
    <h2 mat-dialog-title>{{ getTitle() }}</h2>
    <button mat-icon-button mat-dialog-close>
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="recetaForm" (ngSubmit)="onSubmit()">
    <mat-dialog-content class="dialog-content">
      
      <!-- Nombre -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre de la receta</mat-label>
        <input matInput 
               formControlName="nombre" 
               placeholder="Ej: Lasaña de Carne"
               maxlength="255">
        <mat-error *ngIf="recetaForm.get('nombre')?.hasError('required')">
          El nombre es requerido
        </mat-error>
        <mat-error *ngIf="recetaForm.get('nombre')?.hasError('minlength')">
          El nombre debe tener al menos 3 caracteres
        </mat-error>
        <mat-error *ngIf="recetaForm.get('nombre')?.hasError('maxlength')">
          El nombre no puede exceder 255 caracteres
        </mat-error>
      </mat-form-field>

      <!-- Descripción -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Descripción (opcional)</mat-label>
        <textarea matInput 
                  formControlName="descripcion" 
                  placeholder="Descripción detallada de la receta..."
                  rows="3"
                  maxlength="1000"></textarea>
        <mat-hint>{{ recetaForm.get('descripcion')?.value?.length || 0 }}/1000</mat-hint>
        <mat-error *ngIf="recetaForm.get('descripcion')?.hasError('maxlength')">
          La descripción no puede exceder 1000 caracteres
        </mat-error>
      </mat-form-field>

      <!-- Estado -->
      <mat-checkbox formControlName="activo" class="full-width">
        Receta activa
      </mat-checkbox>

    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button 
              type="button" 
              (click)="onCancel()"
              [disabled]="loading">
        Cancelar
      </button>
      
      <button mat-raised-button 
              color="primary" 
              type="submit"
              [disabled]="recetaForm.invalid || loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">{{ getSubmitButtonText() }}</span>
      </button>
    </mat-dialog-actions>
  </form>
</div>
