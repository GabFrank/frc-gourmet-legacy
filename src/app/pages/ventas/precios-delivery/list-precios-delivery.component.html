<div class="page-container">
  <div class="page-header">
    <h2>PRECIOS DE DELIVERY</h2>
    <button mat-raised-button color="primary" (click)="crear()">
      <mat-icon>add</mat-icon>
      NUEVO PRECIO
    </button>
  </div>

  <table mat-table [dataSource]="preciosDelivery" class="mat-elevation-z2" style="width: 100%">
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>DESCRIPCIÓN</th>
      <td mat-cell *matCellDef="let p">{{ p.descripcion }}</td>
    </ng-container>

    <ng-container matColumnDef="valor">
      <th mat-header-cell *matHeaderCellDef>VALOR</th>
      <td mat-cell *matCellDef="let p">{{ p.valor | number:'1.0-2' }}</td>
    </ng-container>

    <ng-container matColumnDef="activo">
      <th mat-header-cell *matHeaderCellDef>ESTADO</th>
      <td mat-cell *matCellDef="let p">
        <mat-chip-listbox>
          <mat-chip [color]="p.activo ? 'primary' : 'warn'" selected>
            {{ p.activo ? 'ACTIVO' : 'INACTIVO' }}
          </mat-chip>
        </mat-chip-listbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="editar(p)">
            <mat-icon>edit</mat-icon>
            <span>EDITAR</span>
          </button>
          <button mat-menu-item (click)="eliminar(p)">
            <mat-icon color="warn">delete</mat-icon>
            <span>ELIMINAR</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="preciosDelivery.length === 0" style="text-align: center; padding: 40px; opacity: 0.7">
    No hay precios de delivery configurados.
  </div>
</div>
