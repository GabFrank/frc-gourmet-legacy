<div class="dashboard-container">
  <h1 class="dashboard-title">Dashboard de productos</h1>

  <div class="dashboard-grid">
    <mat-card *ngFor="let item of dashboardItems"
              class="dashboard-card"
              [class.disabled-card]="item.disabled"
              (click)="navigateTo(item)"
              [matTooltip]="item.disabled ? 'En desarrollo' : ''"
              [ngStyle]="{'border-top': '4px solid ' + item.color}">
      <mat-card-header>
        <div mat-card-avatar class="card-icon" [ngStyle]="{'background-color': item.disabled ? '#9e9e9e' : item.color}">
          <mat-icon>{{item.icon}}</mat-icon>
        </div>
        <mat-card-title>{{item.title}}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>{{item.description}}</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button [color]="item.disabled ? '' : 'primary'" [disabled]="item.disabled">
          {{ item.disabled ? 'EN DESARROLLO' : 'ABRIR' }}
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
