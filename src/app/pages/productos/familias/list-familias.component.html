<div class="familias-container">
  <div class="familias-wrapper">
    <div class="header-section">
      <div class="header-title">
        <mat-icon>category</mat-icon>
        <h3>Gestión de Familias de productos</h3>
      </div>
      <div class="header-actions">
        <button mat-raised-button color="primary" (click)="openCreateDialog()" matTooltip="Crear nueva familia">
          <mat-icon>add</mat-icon>
          NUEVA
        </button>
      </div>
    </div>

    <div class="filter-container">
      <mat-card class="filter-card">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Filtrar familias</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Buscar por nombre..." #input>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
      </mat-card>
    </div>

    <div class="content-section">
      <mat-card class="table-card">
        <!-- Loading bar -->
        <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>

        <!-- Filter input-->


        <!-- Table -->
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" class="familias-table">
            <!-- Nombre Column -->
            <ng-container matColumnDef="nombre">
              <th mat-header-cell *matHeaderCellDef class="text-left" style="width: 50%;">Nombre</th>
              <td mat-cell *matCellDef="let familia" class="text-left" style="width: 50%;">{{ familia.nombre }}</td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="activo">
              <th mat-header-cell *matHeaderCellDef class="text-center" style="width: 20%;">Estado</th>
              <td mat-cell *matCellDef="let familia" class="text-center" style="width: 20%;">
                <span class="status-badge" [ngClass]="{'active': familia.activo, 'inactive': !familia.activo}">
                  {{ familia.activo ? 'ACTIVO' : 'INACTIVO' }}
                </span>
              </td>
            </ng-container>

            <!-- Created Date Column -->
            <ng-container matColumnDef="createdAt">
              <th mat-header-cell *matHeaderCellDef class="text-center" style="width: 20%;">Fecha Creación</th>
              <td mat-cell *matCellDef="let familia" class="text-center" style="width: 20%;">
                {{ familia.createdAt | date:'dd/MM/yyyy HH:mm' }}
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-center">Acciones</th>
              <td mat-cell *matCellDef="let familia" class="text-center">
                <div class="actions-container">
                  <button mat-icon-button [matMenuTriggerFor]="menu">
                    <mat-icon>more_vert</mat-icon>
                  </button>
                  <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEditDialog(familia)">
                      <mat-icon color="primary">edit</mat-icon>
                      <span>Editar familia</span>
                    </button>
                    <button mat-menu-item (click)="toggleStatus(familia)">
                      <mat-icon [color]="familia.activo ? 'warn' : 'primary'">
                        {{ familia.activo ? 'visibility_off' : 'visibility' }}
                      </mat-icon>
                      <span>{{ familia.activo ? 'Desactivar familia' : 'Activar familia' }}</span>
                    </button>
                    <button mat-menu-item (click)="deleteFamilia(familia)">
                      <mat-icon color="warn">delete</mat-icon>
                      <span>Eliminar familia</span>
                    </button>
                  </mat-menu>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <!-- No data message -->
          <div *ngIf="dataSource.data.length === 0 && !isLoading" class="no-data">
            <mat-icon>category</mat-icon>
            <p>No hay familias registradas</p>
            <button mat-raised-button color="primary" (click)="openCreateDialog()">
              CREAR PRIMERA FAMILIA
            </button>
          </div>
        </div>

        <!-- Paginator -->
        <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons>
        </mat-paginator>
      </mat-card>
    </div>
  </div>
</div>
