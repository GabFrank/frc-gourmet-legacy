<div class="page-container">
  <div class="page-header">
    <h2>Categorías de Compra</h2>
    <button mat-raised-button color="primary" (click)="showCreateForm()" *ngIf="!showInlineForm">
      <mat-icon>add</mat-icon> Nueva Categoría
    </button>
  </div>

  <mat-card *ngIf="showInlineForm" class="inline-form">
    <form [formGroup]="inlineForm" class="form-row">
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre">
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Categoría padre (opcional)</mat-label>
        <mat-select formControlName="padreId">
          <mat-option [value]="null">Sin padre</mat-option>
          <mat-option *ngFor="let c of categorias" [value]="c.id" [disabled]="c.id === editingId">{{c.nombre}}</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="saveInlineForm()" [disabled]="inlineForm.invalid">
        <mat-icon>save</mat-icon> Guardar
      </button>
      <button mat-stroked-button (click)="cancelInlineForm()">Cancelar</button>
    </form>
  </mat-card>

  <div *ngIf="loading" class="spinner-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="!loading">
    <table mat-table [dataSource]="categorias" class="full-width">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let c">{{c.nombre}}</td>
      </ng-container>
      <ng-container matColumnDef="padre">
        <th mat-header-cell *matHeaderCellDef>Padre</th>
        <td mat-cell *matCellDef="let c">{{c.padre?.nombre || '-'}}</td>
      </ng-container>
      <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let c">
          <mat-icon [color]="c.activo ? 'primary' : 'warn'">{{c.activo ? 'check_circle' : 'cancel'}}</mat-icon>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button [matMenuTriggerFor]="m"><mat-icon>more_vert</mat-icon></button>
          <mat-menu #m="matMenu">
            <button mat-menu-item (click)="editCategoria(c)"><mat-icon>edit</mat-icon><span>Editar</span></button>
            <button mat-menu-item (click)="desactivar(c)" *ngIf="c.activo"><mat-icon>block</mat-icon><span>Desactivar</span></button>
          </mat-menu>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div *ngIf="categorias.length === 0" class="empty-state">No hay categorías</div>
  </mat-card>
</div>
