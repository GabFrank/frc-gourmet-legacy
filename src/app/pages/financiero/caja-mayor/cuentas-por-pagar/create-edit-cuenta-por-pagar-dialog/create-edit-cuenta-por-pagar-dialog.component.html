<h2 mat-dialog-title>Nueva Cuenta por Pagar</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-container">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="descripcion">
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Tipo</mat-label>
        <mat-select formControlName="tipo">
          <mat-option *ngFor="let t of tipoOptions" [value]="t">{{t}}</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Proveedor (opcional)</mat-label>
        <mat-select formControlName="proveedorId">
          <mat-option [value]="null">Sin proveedor</mat-option>
          <mat-option *ngFor="let p of proveedores" [value]="p.id">{{p.nombre}}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="row">
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Monto total</mat-label>
        <input matInput type="number" formControlName="montoTotal" min="0.01" step="0.01">
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Moneda</mat-label>
        <mat-select formControlName="monedaId">
          <mat-option *ngFor="let m of monedas" [value]="m.id">{{m.simbolo}} {{m.denominacion}}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="row">
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Fecha inicio</mat-label>
        <input matInput [matDatepicker]="pk" formControlName="fechaInicio">
        <mat-datepicker-toggle matSuffix [for]="pk"></mat-datepicker-toggle>
        <mat-datepicker #pk></mat-datepicker>
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex">
        <mat-label>Cantidad de cuotas</mat-label>
        <input matInput type="number" formControlName="cantidadCuotas" min="1" step="1">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Observación</mat-label>
      <input matInput formControlName="observacion">
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="saving">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="form.invalid || saving">
    <mat-spinner *ngIf="saving" diameter="20"></mat-spinner>
    <span *ngIf="!saving">Crear</span>
  </button>
</mat-dialog-actions>
