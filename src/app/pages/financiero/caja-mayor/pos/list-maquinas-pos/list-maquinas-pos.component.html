<div class="page-container">
  <div class="page-header">
    <h2>Maquinas POS</h2>
    <button mat-raised-button color="primary" (click)="crear()">
      <mat-icon>add</mat-icon> Nueva Maquina
    </button>
  </div>

  <div *ngIf="loading" class="spinner-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="!loading">
    <table mat-table [dataSource]="maquinas" class="full-width">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{r.nombre}}</td>
      </ng-container>
      <ng-container matColumnDef="cuenta">
        <th mat-header-cell *matHeaderCellDef>Cuenta destino</th>
        <td mat-cell *matCellDef="let r">{{r.cuentaBancaria?.nombre}}</td>
      </ng-container>
      <ng-container matColumnDef="proveedor">
        <th mat-header-cell *matHeaderCellDef>Proveedor</th>
        <td mat-cell *matCellDef="let r">{{r.proveedor || '-'}}</td>
      </ng-container>
      <ng-container matColumnDef="comision">
        <th mat-header-cell *matHeaderCellDef>Comisión %</th>
        <td mat-cell *matCellDef="let r">{{r.porcentajeComision | number:'1.0-2'}}%</td>
      </ng-container>
      <ng-container matColumnDef="minutos">
        <th mat-header-cell *matHeaderCellDef>Min. acred.</th>
        <td mat-cell *matCellDef="let r">{{r.minutosAcreditacion}}</td>
      </ng-container>
      <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let r">
          <mat-icon [color]="r.activo ? 'primary' : 'warn'">{{r.activo ? 'check_circle' : 'cancel'}}</mat-icon>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button [matMenuTriggerFor]="m"><mat-icon>more_vert</mat-icon></button>
          <mat-menu #m="matMenu">
            <button mat-menu-item (click)="editar(r)"><mat-icon>edit</mat-icon><span>Editar</span></button>
            <button mat-menu-item (click)="desactivar(r)" *ngIf="r.activo"><mat-icon>block</mat-icon><span>Desactivar</span></button>
          </mat-menu>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div *ngIf="maquinas.length === 0" class="empty-state">No hay máquinas POS</div>
  </mat-card>
</div>
